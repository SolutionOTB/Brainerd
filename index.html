<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Paul Bunyan's Trip Guide — Brainerd, MN</title>
<style>
  :root {
    color-scheme: light;
    /* Paul Bunyan palette */
    --plaid-red: #a32424;
    --plaid-red-dark: #6e1818;
    --plaid-black: #1a1a1a;
    --pine: #1f4030;
    --pine-deep: #14291f;
    --moss: #4a6b4c;
    --moss-soft: #e3ebde;
    --wood: #8b5a2b;
    --wood-light: #b88a5a;
    --cream: #f6ecd2;
    --cream-soft: #fbf6e6;
    --parchment: #f3e1b8;
    --ox-blue: #4a78b8;
    --ox-blue-soft: #dbe5f1;
    --ink: #2a2018;
    --muted: #6a5a48;
    --line: #ddd1b2;
    --star: #d6a32a;
    --shadow: 0 1px 2px rgba(60,40,20,.06), 0 6px 20px rgba(60,40,20,.08);
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "Georgia", "Times New Roman", serif;
    background:
      linear-gradient(rgba(246,236,210,0.92), rgba(246,236,210,0.92)),
      repeating-linear-gradient(90deg, transparent 0 80px, rgba(139,90,43,0.04) 80px 81px),
      repeating-linear-gradient(0deg, transparent 0 80px, rgba(139,90,43,0.04) 80px 81px),
      var(--cream);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.5;
  }

  /* Buffalo plaid pattern for header */
  .plaid {
    background-color: var(--plaid-red);
    background-image:
      linear-gradient(rgba(0,0,0,0.45) 50%, transparent 50%),
      linear-gradient(90deg, rgba(0,0,0,0.45) 50%, transparent 50%);
    background-size: 28px 28px;
    background-blend-mode: multiply, multiply;
  }

  .app {
    display: grid;
    grid-template-columns: 1fr 290px;
    grid-template-rows: auto 1fr auto;
    grid-template-areas:
      "header header"
      "chat   sidebar"
      "input  sidebar";
    height: 100vh;
    max-width: 1200px;
    margin: 0 auto;
    gap: 10px;
    padding: 10px;
  }
  @media (max-width: 820px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-areas:
        "header"
        "chat"
        "input"
        "sidebar";
      grid-template-rows: auto minmax(360px, 1fr) auto auto;
      height: auto;
      min-height: 100vh;
      gap: 8px;
      padding: 8px;
    }
    .sidebar {
      max-height: none;
      order: 5;
    }
    header.banner { grid-template-columns: 1fr; min-height: auto; }
    .banner-art { min-height: 120px; max-height: 140px; border-right: none; border-bottom: 3px solid var(--plaid-black); }
    .banner-info h1 { font-size: 22px; line-height: 1.05; }
    .banner-info .sub { font-size: 12.5px; }
    .banner-info { padding: 12px 16px; gap: 8px; }
    .banner-dates { font-size: 12.5px; padding: 6px 10px; gap: 6px; margin-top: 8px; }
    .banner-dates .dates { font-size: 14px; }
    .vibe-row { padding: 8px 10px; gap: 6px; }
    .vibe-hint { display: none; }
    .chips { padding: 8px 10px; gap: 5px; }
    .chip { font-size: 12px; padding: 5px 10px; }
    .msg { max-width: 95%; font-size: 14.5px; }
    .input-wrap { padding: 8px; }
    .input-wrap input { font-size: 16px; padding: 9px 12px; } /* 16px prevents iOS zoom on focus */
    .input-wrap button { padding: 9px 14px; font-size: 13px; }
  }
  @media (max-width: 500px) {
    /* Banner still STACKED (1 column) from the 820px rule above */
    .banner-info h1 { font-size: 20px; line-height: 1.05; }
    .banner-info .sub { display: none; }
    .banner-art { min-height: 110px; max-height: 130px; }
    .banner-art svg { max-height: 130px; }
    .banner-info { padding: 10px 14px; }
    .banner-dates { font-size: 11.5px; padding: 4px 9px; margin-top: 4px; }
    .banner-dates .dates { font-size: 13px; }
    .banner-dates .divider, .banner-dates span:last-child { display: none; }
    .chip { font-size: 11.5px; padding: 4px 9px; }
    .vibe-pill { font-size: 11.5px; padding: 4px 9px; }
    .identity-bar { padding: 6px 10px; font-size: 12px; }
    .messages { padding: 10px; gap: 10px; }
    .msg { padding: 10px 12px; font-size: 14px; max-width: 95%; }
    .sidebar { padding: 10px; }
    .user-picker { padding: 14px; }
    .user-picker h3 { font-size: 16px; }
    .user-picker .user-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .user-picker .user-btn { padding: 8px 4px; font-size: 12.5px; }
    .user-picker .user-btn .user-emoji { font-size: 22px; }
  }

  /* ===================== HEADER ===================== */
  header.banner {
    grid-area: header;
    border-radius: var(--radius);
    padding: 0;
    overflow: hidden;
    box-shadow: var(--shadow);
    border: 3px solid var(--plaid-black);
    display: grid;
    grid-template-columns: 220px 1fr;
    align-items: stretch;
    min-height: 140px;
    max-height: 200px;
  }
  .banner-art {
    background: linear-gradient(180deg, #2a4a78 0%, #1f4030 60%, #14291f 100%);
    padding: 0;
    display: flex;
    align-items: stretch;
    justify-content: center;
    border-right: 3px solid var(--plaid-black);
    position: relative;
    overflow: hidden;
  }
  .banner-art svg { display: block; width: 100%; height: 100%; }
  .banner-info {
    padding: 18px 26px;
    color: var(--cream);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background:
      repeating-linear-gradient(45deg, transparent 0 30px, rgba(255,255,255,0.025) 30px 31px),
      var(--plaid-red);
  }
  .banner-info h1 {
    margin: 0;
    font-size: 34px;
    font-family: "Impact", "Bebas Neue", "Arial Black", sans-serif;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    text-shadow: 3px 3px 0 var(--plaid-black);
    line-height: 1.05;
  }
  .banner-info .sub {
    font-size: 15px;
    color: var(--cream);
    opacity: 0.95;
    margin-top: 6px;
    font-style: italic;
    font-family: Georgia, serif;
  }
  .banner-dates {
    margin-top: 12px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(0,0,0,0.25);
    padding: 8px 14px;
    border-radius: 6px;
    border: 1.5px solid rgba(246,236,210,0.3);
    font-family: Georgia, serif;
    font-size: 13.5px;
    align-self: flex-start;
  }
  .banner-dates .dates {
    font-family: "Impact", sans-serif;
    font-size: 16px;
    letter-spacing: 0.03em;
  }
  .banner-dates .divider {
    width: 1px; height: 18px;
    background: rgba(246,236,210,0.4);
  }

  /* ===================== INLINE PROMPT LINKS (in welcome message) ===================== */
  .msg.bot .prompt-link {
    background: var(--cream-soft);
    border: 1.5px solid var(--wood);
    color: var(--pine-deep);
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    font-family: Georgia, serif;
    margin: 3px 4px 3px 0;
    display: inline-block;
    transition: all 0.15s;
    text-decoration: none;
  }
  .msg.bot .prompt-link:hover { background: var(--plaid-red); color: var(--cream); border-color: var(--plaid-red-dark); }
  .msg.bot .prompt-link.funny { background: var(--ox-blue-soft); border-color: var(--ox-blue); font-style: italic; }
  .msg.bot .prompt-link.funny:hover { background: var(--ox-blue); color: white; }

  /* ===================== CHAT ===================== */
  .chat-wrap {
    grid-area: chat;
    background: var(--cream-soft);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 2px solid var(--wood);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .chips {
    display: flex;
    flex-wrap: nowrap;
    overflow-x: auto;
    gap: 6px;
    padding: 9px 12px;
    border-bottom: 2px solid var(--line);
    background: var(--parchment);
    scrollbar-width: thin;
    -webkit-overflow-scrolling: touch;
  }
  .chips::-webkit-scrollbar { height: 4px; }
  .chips::-webkit-scrollbar-thumb { background: var(--wood); border-radius: 2px; }
  .chip { flex-shrink: 0; white-space: nowrap; }
  .chip {
    background: var(--pine);
    color: var(--cream);
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-family: "Impact", sans-serif;
    letter-spacing: 0.03em;
    transition: all 0.15s;
  }
  .chip:hover { background: var(--pine-deep); transform: translateY(-1px); }
  .chip.red { background: var(--plaid-red); }
  .chip.red:hover { background: var(--plaid-red-dark); }
  .chip.wood { background: var(--wood); }
  .chip.wood:hover { background: #6b4220; }

  /* User identity bar (above chips) */
  .identity-bar {
    background: var(--parchment);
    border-bottom: 2px solid var(--line);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--ink);
  }
  .identity-bar .who-label {
    font-family: "Impact", sans-serif;
    font-size: 12px;
    letter-spacing: 0.05em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .identity-bar .who-pill {
    background: white;
    border: 1.5px solid var(--wood);
    border-radius: 999px;
    padding: 3px 12px;
    font-weight: 600;
    color: var(--pine-deep);
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .identity-bar .switch-btn {
    background: none;
    border: none;
    color: var(--plaid-red);
    font-size: 12px;
    cursor: pointer;
    text-decoration: underline;
    font-family: Georgia, serif;
    padding: 0 2px;
  }
  .identity-bar .switch-btn:hover { color: var(--plaid-red-dark); }

  /* User picker card */
  .user-picker {
    background: white;
    border: 2px solid var(--wood);
    border-radius: 12px;
    padding: 18px;
    margin: 0;
    box-shadow: var(--shadow);
  }
  .user-picker h3 {
    margin: 0 0 6px 0;
    color: var(--plaid-red-dark);
    font-family: "Impact", sans-serif;
    font-size: 18px;
    letter-spacing: 0.03em;
  }
  .user-picker .picker-sub {
    color: var(--muted);
    font-size: 13.5px;
    margin-bottom: 14px;
    font-style: italic;
  }
  .user-picker .group-label {
    font-family: "Impact", sans-serif;
    font-size: 12px;
    letter-spacing: 0.05em;
    color: var(--wood);
    text-transform: uppercase;
    margin: 10px 0 6px 0;
  }
  .user-picker .user-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .user-picker .user-btn {
    background: var(--cream-soft);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 10px 6px;
    cursor: pointer;
    font-family: Georgia, serif;
    font-size: 13.5px;
    text-align: center;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .user-picker .user-btn:hover {
    background: var(--parchment);
    border-color: var(--plaid-red);
    transform: translateY(-1px);
  }
  .user-picker .user-btn .user-emoji {
    font-size: 24px;
    line-height: 1;
  }
  .user-picker .user-btn .user-name {
    font-weight: 600;
    color: var(--pine-deep);
  }

  /* Vibe filter row */
  .vibe-toggle-row {
    background: var(--cream-soft);
    border-bottom: 1px solid var(--line);
    padding: 4px 10px;
  }
  .vibe-toggle {
    background: none;
    border: none;
    color: var(--muted);
    font-family: Georgia, serif;
    font-size: 12.5px;
    padding: 4px 6px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border-radius: 4px;
  }
  .vibe-toggle:hover { color: var(--ink); background: var(--parchment); }
  .vibe-toggle-count {
    font-size: 11px;
    color: var(--wood);
    background: var(--parchment);
    padding: 1px 7px;
    border-radius: 999px;
    font-family: "Impact", sans-serif;
    letter-spacing: 0.03em;
  }
  .vibe-toggle-caret { transition: transform 0.15s; }
  .vibe-row.collapsed { display: none; }
  .vibe-toggle.expanded .vibe-toggle-caret { transform: rotate(180deg); }
  .vibe-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 12px;
    border-bottom: 2px solid var(--line);
    background: var(--cream-soft);
  }
  .vibe-row .label {
    font-family: "Impact", sans-serif;
    font-size: 12px;
    letter-spacing: 0.05em;
    color: var(--muted);
    text-transform: uppercase;
    margin-right: 4px;
  }
  .vibe-pill {
    background: white;
    border: 1.5px solid var(--line);
    color: var(--muted);
    padding: 5px 11px;
    border-radius: 999px;
    font-size: 12.5px;
    cursor: pointer;
    font-family: Georgia, serif;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    opacity: 0.6;
  }
  .vibe-pill:hover { opacity: 0.85; }
  .vibe-pill.active {
    opacity: 1;
    color: white;
    font-weight: 600;
  }
  .vibe-pill.active.divy     { background: var(--wood);    border-color: #6b4220; }
  .vibe-pill.active.modern   { background: var(--ox-blue); border-color: #3a5e8f; }
  .vibe-pill.active.stuffy   { background: #5a4a78;        border-color: #3a2858; }
  .vibe-pill.active.lake     { background: #2f6f8f;        border-color: #1f5070; }
  .vibe-pill.active.delivery { background: var(--plaid-red); border-color: var(--plaid-red-dark); }
  .vibe-pill.active.old      { background: var(--pine);    border-color: var(--pine-deep); }
  .vibe-hint {
    font-size: 11.5px;
    color: var(--muted);
    font-style: italic;
    margin-left: auto;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg {
    max-width: 90%;
    padding: 12px 15px;
    border-radius: 12px;
    white-space: pre-wrap;
    word-wrap: break-word;
    line-height: 1.55;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--plaid-red);
    color: var(--cream);
    border-bottom-right-radius: 4px;
    font-family: Georgia, serif;
  }
  .msg.bot {
    align-self: flex-start;
    background: white;
    color: var(--ink);
    border-bottom-left-radius: 4px;
    border: 1.5px solid var(--line);
    box-shadow: 0 1px 3px rgba(60,40,20,0.04);
  }
  .msg.bot.thinking { font-style: italic; color: var(--muted); border-style: dashed; }
  .msg.bot a { color: var(--plaid-red); text-decoration: underline; }
  .msg.bot strong { color: var(--pine-deep); }
  .msg.bot h3 {
    margin: 10px 0 4px 0;
    font-size: 14px;
    color: var(--plaid-red-dark);
    font-family: "Impact", sans-serif;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .msg.bot ul { margin: 4px 0 4px 18px; padding: 0; }
  .msg.bot li { margin: 4px 0; }
  .msg.bot .place {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--cream-soft);
    border: 1.5px solid var(--wood);
    padding: 3px 4px 3px 9px;
    border-radius: 6px;
    margin: 2px 4px 2px 0;
    font-size: 13.5px;
    font-weight: bold;
    color: var(--pine-deep);
    font-family: Georgia, serif;
    cursor: pointer;
    transition: background 0.15s;
  }
  .msg.bot .place:hover { background: var(--parchment); }
  .msg.bot .place.is-saved { background: #fbf2dc; border-color: var(--star); }
  .msg.bot .star-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #b8a070;
    font-size: 19px;
    padding: 2px 6px;
    margin-left: 2px;
    line-height: 1;
    min-width: 28px;
    min-height: 28px;
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    vertical-align: middle;
  }
  .msg.bot .star-btn.starred { color: var(--star); }
  .msg.bot .star-btn:hover, .msg.bot .star-btn:active { color: var(--star); background: rgba(214,163,42,0.12); }
  .msg.bot .msg-actions {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--line);
    display: flex;
    justify-content: flex-end;
    gap: 6px;
  }
  .msg.bot .save-msg-btn {
    background: var(--cream-soft);
    border: 1.5px solid var(--wood);
    color: var(--wood);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-family: Georgia, serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .msg.bot .save-msg-btn:hover { background: var(--wood); color: var(--cream); }
  .msg.bot .save-msg-btn.saved {
    background: var(--pine);
    color: var(--cream);
    border-color: var(--pine-deep);
  }
  .msg.bot .quote {
    border-left: 3px solid var(--wood);
    padding: 2px 0 2px 10px;
    margin: 6px 0;
    font-style: italic;
    color: var(--muted);
    font-size: 13.5px;
  }

  /* ===================== INPUT ===================== */
  .input-wrap {
    grid-area: input;
    background: var(--cream-soft);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 2px solid var(--wood);
    padding: 12px;
    display: flex;
    gap: 8px;
  }
  .input-wrap input {
    flex: 1;
    border: 1.5px solid var(--line);
    background: white;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 15px;
    font-family: Georgia, serif;
    color: var(--ink);
    outline: none;
  }
  .input-wrap input:focus { border-color: var(--plaid-red); }
  .input-wrap input::placeholder { color: var(--muted); font-style: italic; }
  .input-wrap button {
    background: var(--plaid-red);
    color: var(--cream);
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-weight: 700;
    cursor: pointer;
    font-size: 14px;
    font-family: "Impact", sans-serif;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: background 0.15s;
  }
  .input-wrap button:hover { background: var(--plaid-red-dark); }
  .input-wrap button:disabled { background: #b8aa90; cursor: not-allowed; }

  /* ===================== SIDEBAR ===================== */
  .sidebar {
    grid-area: sidebar;
    background: var(--cream-soft);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 2px solid var(--wood);
    padding: 14px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .sidebar h2 {
    font-size: 13px;
    font-weight: 700;
    color: var(--plaid-red-dark);
    font-family: "Impact", sans-serif;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin: 0 0 6px 0;
    border-bottom: 2px solid var(--wood);
    padding-bottom: 4px;
  }
  /* Sidebar tabs */
  .tabs {
    display: flex;
    gap: 2px;
    border-bottom: 2px solid var(--wood);
    margin-bottom: 8px;
  }
  .tab {
    flex: 1;
    background: transparent;
    border: none;
    padding: 8px 6px;
    font-family: "Impact", sans-serif;
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
  }
  .tab.active { color: var(--plaid-red-dark); border-bottom-color: var(--plaid-red); }
  .tab:hover { color: var(--ink); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Saved Places categorized list */
  .saved-cat {
    margin-bottom: 12px;
  }
  .saved-cat-header {
    font-family: "Impact", sans-serif;
    font-size: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--wood);
    margin: 0 0 4px 0;
    padding: 4px 6px;
    background: var(--parchment);
    border-radius: 4px;
  }
  .saved-cat ul {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .saved-cat li {
    background: white;
    border: 1.5px solid var(--line);
    border-radius: 6px;
    padding: 6px 8px;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 4px;
  }
  .saved-cat .fav-name {
    font-weight: 600;
    color: var(--pine-deep);
    flex: 1;
    line-height: 1.2;
  }
  .saved-cat .place-actions {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }

    text-decoration: none;
    display: inline-block;

    background: #b8aa90;
    pointer-events: none;
    cursor: not-allowed;
  }
  .empty {
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
  }
  .typing-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    margin: 0 1px;
    background: var(--wood);
    border-radius: 50%;
    animation: blink 1.2s infinite;
  }

  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 60%, 100% { opacity: 0.3; }
    30% { opacity: 1; }
  }
  .clear-btn {
    background: transparent;
    border: 1.5px solid var(--wood);
    color: var(--muted);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    font-family: Georgia, serif;
    cursor: pointer;
    align-self: flex-start;

  .clear-btn:hover { color: var(--plaid-red); border-color: var(--plaid-red); }

    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .notes-list li {
    background: white;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 12.5px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .notes-list .note-q {
    font-weight: 600;
    color: var(--pine-deep);
    font-size: 12px;
    line-height: 1.35;
  }
  .notes-list .note-a {

    line-height: 1.35;

    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }
  .notes-list .note-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    padding: 2px 4px;
  }

  .export-btn {
    background: var(--pine);
    color: var(--cream);

    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    font-family: "Impact", sans-serif;

function pickPrompts(realCount = 3) {
  const shuffleReal = [...REAL_PROMPTS].sort(() => Math.random() - 0.5).slice(0, realCount);
  const funny = FUNNY_PROMPTS[Math.floor(Math.random() * FUNNY_PROMPTS.length)];
  const all = [...shuffleReal.map(p => ({text: p, funny: false})), {text: funny, funny: true}];
  return all.sort(() => Math.random() - 0.5);
}

// Defensive localStorage — falls back to in-memory if blocked
const memStore = {};
function safeGet(key) {
  try { return localStorage.getItem(key); }
  catch (e) { return memStore[key] || null; }
}
function safeSet(key, val) {
  try { localStorage.setItem(key, val); }
  catch (e) { memStore[key] = val; }
}
// Tiny deterministic string hash for cache keys (DJB2)
function simpleHash(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) | 0;
  return (h >>> 0).toString(36);
}

function findPlace(name) {
  const lname = name.toLowerCase();
  for (const cat of Object.keys(CATEGORY_META)) {
    const arr = BRAINERD_DATA[cat] || [];
    for (const p of arr) {
      if (p.name.toLowerCase() === lname) return { ...p, category: cat };
      // partial match — handles renamed places like "Iven's" reference
      if (p.name.toLowerCase().includes(lname) || lname.includes(p.name.toLowerCase().split(" ")[0].toLowerCase())) {
        // Only match if the first significant word matches to avoid false positives
        if (p.name.toLowerCase().split(/\s+/)[0] === lname.split(/\s+/)[0]) {
          return { ...p, category: cat };
        }
      }
    }
  }
  return { name: name, category: "other", area: "Brainerd area" };
}

function mapsUrlForPlace(name) {
  return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(name + " Brainerd MN");
}

function mapsUrlForAll() {
  // Kept for backwards compat — not used now; "View all" opens individual tabs instead.
  if (favorites.length === 0) return "#";
  // Google Maps directions URL — shows all places on one map with a route between them
  const stops = favorites.map(f => encodeURIComponent(f.name + " Brainerd MN")).join("/");
  return "https://www.google.com/maps/dir/" + stops;
}

// ============================================================================
// RENDER HELPERS
// ============================================================================
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

function renderBotText(text) {
  let html = escapeHtml(text);
  html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  // Quote blocks: lines starting with >
  html = html.replace(/^&gt; (.+)$/gm, '<div class="quote">$1</div>');
  // Bracketed place names -> chips with star. Whole chip is tappable on mobile.
  html = html.replace(/\[([^\]]+)\]/g, (m, name) => {
    const isStarred = favorites.some(f => f.name.toLowerCase() === name.toLowerCase());
    const placeClass = "place" + (isStarred ? " is-saved" : "");
    const starClass = isStarred ? "star-btn starred" : "star-btn";
    const starChar = isStarred ? "★" : "☆";
    return `<span class="${placeClass}" data-place-name="${escapeHtml(name)}">${escapeHtml(name)}<button class="${starClass}" data-name="${escapeHtml(name)}" title="Save to favorites">${starChar}</button></span>`;
  });
  // Bullets & headings
  const lines = html.split("\n");
  let out = [];
  let inList = false;
  for (const line of lines) {
    if (/^- /.test(line)) {
      if (!inList) { out.push("<ul>"); inList = true; }
      out.push("<li>" + line.replace(/^- /, "") + "</li>");
    } else if (/^### /.test(line)) {
      if (inList) { out.push("</ul>"); inList = false; }
      out.push("<h3>" + line.replace(/^### /, "") + "</h3>");
    } else {
      if (inList) { out.push("</ul>"); inList = false; }
      if (line.trim()) out.push("<div>" + line + "</div>");
    }
  }
  if (inList) out.push("</ul>");
  return out.join("");
}

function findPrecedingQuestion(botIndex) {
  for (let i = botIndex - 1; i >= 0; i--) {
    if (history[i].role === "user") return history[i].text;
  }
  return "(no preceding question)";
}

        `Ask me anything — best ice cream, biggest statue, where the loons live.\n\n` +

    } else if (user) {
      welcomeText =
        `**${user.name}.** Try to keep up.\n\n` +
        `Star a place to save it (sidebar). Pin an answer to keep it. Toggle vibe pills to shape picks. Ask me anything.\n\n` +
        `__INLINE_PROMPTS__`;
    } else {
      welcomeText = "Pick a person first. Up there ☝️";
    }
    // Inject clickable prompt pills inline
    const prompts = pickPrompts(user && user.type === "kid" ? 2 : 3);

      `<button class="prompt-link${p.funny ? " funny" : ""}" data-prompt="${escapeHtml(p.text)}">${escapeHtml(p.text)}</button>`
    ).join("");
    welcome.innerHTML = renderBotText(welcomeText).replace("__INLINE_PROMPTS__", '<div style="margin-top:6px">' + promptsHtml + '</div>');
    messagesEl.appendChild(welcome);

    if (m.role === "bot") {

      const isSaved = savedNotes.some(n => n.id === msgId);
      div.innerHTML = renderBotText(m.text) +
        `<div class="msg-actions">
          <button class="save-msg-btn${isSaved ? " saved" : ""}" data-msg-id="${msgId}" data-msg-idx="${idx}">
            ${isSaved ? "✓ Saved" : "📌 Save this"}
          </button>
        </div>`;
    } else {
      div.textContent = m.text;
    }
    messagesEl.appendChild(div);

}

// Scroll the top of a message into view at the top of the messages pane
function scrollMessageToTop(idx) {
  const el = document.getElementById("msg-dom-" + idx);
  if (!el) return;
  // Use scrollIntoView with block:start so reading starts at the top of the response
  try {
    el.scrollIntoView({ block: "start", behavior: "smooth" });
  } catch (e) {
    // Fallback for older browsers
    messagesEl.scrollTop = el.offsetTop - messagesEl.offsetTop;
  }
}

function toggleSaveNote(msgId, msgIdx) {
  const existing = savedNotes.findIndex(n => n.id === msgId);
  if (existing >= 0) {
    savedNotes.splice(existing, 1);
  } else {
    const botMsg = history[msgIdx];
    if (!botMsg || botMsg.role !== "bot") return;
    const question = findPrecedingQuestion(msgIdx);
    savedNotes.push({
      id: msgId,
      question: question,
      answer: botMsg.text,
      savedAt: new Date().toISOString()
    });
  }
  safeSet(STORAGE_KEYS.NOTES, JSON.stringify(savedNotes));
  renderMessages();
  renderSavedNotes();
}

function renderSavedNotes() {
  notesListEl.innerHTML = "";
  if (savedNotes.length === 0) {
    const li = document.createElement("li");
    li.className = "empty";
    li.style.border = "none";
    li.style.background = "transparent";
    li.textContent = "Tap 📌 Save on any answer to pin it here.";
    notesListEl.appendChild(li);
    exportBtn.disabled = true;
    return;
  }
  exportBtn.disabled = false;
  // Most recent first
  const sorted = [...savedNotes].sort((a, b) => (b.savedAt || "").localeCompare(a.savedAt || ""));
  for (const note of sorted) {
    // Strip markdown for sidebar preview
    const previewText = note.answer
      .replace(/\*\*(.+?)\*\*/g, "$1")
      .replace(/^### /gm, "")
      .replace(/^- /gm, "• ")
      .replace(/^&gt; /gm, "")
      .replace(/^> /gm, "")
      .replace(/\[([^\]]+)\]/g, "$1");
    const li = document.createElement("li");
    li.innerHTML = `
      <div class="note-q">Q: ${escapeHtml(note.question)}</div>
      <div class="note-a">${escapeHtml(previewText)}</div>
      <div class="note-actions">
        <span>${new Date(note.savedAt).toLocaleDateString()}</span>
        <button data-note-id="${escapeHtml(note.id)}" title="Remove">Remove</button>
      </div>
    `;
    notesListEl.appendChild(li);
  }
}

notesListEl.addEventListener("click", (e) => {

    renderMessages();
    renderSavedNotes();
  }
});

function exportSavedNotes() {
  if (savedNotes.length === 0) return;
  const today = new Date().toISOString().slice(0, 10);
  const sorted = [...savedNotes].sort((a, b) => (a.savedAt || "").localeCompare(b.savedAt || ""));
  let md = "# Brainerd Family Trip — Saved Notes\n\n";
  md += "**Trip:** May 23–29, 2026 (Memorial Day week)\n";
  md += "**Crew:** Grandparents, two couples, daughters 7 & 9, niece 4\n";
  md += "**Exported:** " + today + "\n\n";
  if (favorites.length > 0) {
    md += "## ⭐ Favorite Places\n\n";
    for (const fav of favorites) md += "- " + fav.name + "\n";
    md += "\n";
  }
  md += "## 📌 Saved Q&A\n\n";
  for (const note of sorted) {
    md += "### " + note.question + "\n\n";
    // Convert bracketed places to bold for export readability
    const cleanAnswer = note.answer.replace(/\[([^\]]+)\]/g, "**$1**");
    md += cleanAnswer + "\n\n";
    md += "*Saved " + new Date(note.savedAt).toLocaleDateString() + "*\n\n---\n\n";
  }
  const blob = new Blob([md], { type: "text/markdown;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "brainerd-trip-notes-" + today + ".md";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

exportBtn.addEventListener("click", exportSavedNotes);

function renderFavorites() {
  savedPlacesEl.innerHTML = "";
  if (favorites.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.style.padding = "12px 8px";
    empty.innerHTML = "No saved places yet. Tap ☆ on any place name in the chat to add it.<br/><br/>Saved spots stick around between visits and can be opened on Google Maps.";
    savedPlacesEl.appendChild(empty);
    mapAllBtn.classList.add("disabled");
    mapAllBtn.href = "#";
    return;
  }

  // Group by category
  const groups = {};
  for (const fav of favorites) {
    const cat = fav.category || "other";
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(fav);
  }

  // Render in defined order, then anything else
  const orderedCats = CATEGORY_ORDER.filter(c => groups[c]).concat(
    Object.keys(groups).filter(c => !CATEGORY_ORDER.includes(c))
  );

  for (const cat of orderedCats) {
    const meta = CATEGORY_META[cat] || { label: "Other", icon: "📌" };
    const section = document.createElement("div");
    section.className = "saved-cat";
    const items = groups[cat].map(fav => `
      <li>
        <span class="fav-name">${escapeHtml(fav.name)}</span>
        <span class="place-actions">
          <a href="${mapsUrlForPlace(fav.name)}" target="_blank" rel="noopener" title="Open in Google Maps">🗺️</a>
          <button data-remove="${escapeHtml(fav.name)}" title="Remove">×</button>
        </span>
      </li>
    `).join("");
    section.innerHTML = `
      <div class="saved-cat-header">${meta.icon} ${meta.label} (${groups[cat].length})</div>
      <ul>${items}</ul>
    `;
    savedPlacesEl.appendChild(section);
  }

  // Enable "Open all on Maps" button
  mapAllBtn.classList.remove("disabled");
}

// Open each saved place as a Google Maps pin in its own new tab
function openAllOnMaps() {
  if (favorites.length === 0) return;
  if (favorites.length > 6) {
    if (!confirm("This will open " + favorites.length + " tabs — one Google Maps pin per saved place. Continue?")) return;
  }
  for (const fav of favorites) {
    window.open(mapsUrlForPlace(fav.name), "_blank", "noopener");
  }
}

function toggleFavorite(name) {
  const idx = favorites.findIndex(f => f.name.toLowerCase() === name.toLowerCase());
  if (idx >= 0) {
    favorites.splice(idx, 1);
  } else {
    const place = findPlace(name);
    favorites.push({
      name: place.name || name,
      category: place.category || "other",
      area: place.area || "",
      tiers: place.tiers || (place.tier ? [place.tier] : []),
      added: new Date().toISOString()
    });
  }
  safeSet(STORAGE_KEYS.FAVORITES, JSON.stringify(favorites));
  renderMessages();
  renderFavorites();
}

function buildPrompt(question) {
  const vibeInstruction = selectedVibes.length === ALL_VIBES.length
    ? "VIBE MIX: All vibes are on — recommend whatever fits the question. Try to span tiers when listing multiple places."
    : `VIBE FILTER: User has filtered to: ${selectedVibes.map(v => VIBE_LABELS[v]).join(", ")}. For restaurant recs, ONLY pull places whose 'tiers' array includes one of: [${selectedVibes.join(", ")}]. Non-restaurant questions: ignore this filter.`;

  const user = currentUserId ? getUser(currentUserId) : null;
  let personaInstruction = "";
  if (user && user.type === "adult") {
    personaInstruction = `\n\nWHO: **${user.name}** — adult, can take a joke (and an insult).

TONE FOR ADULTS — STRICT:
- BE SHORT. 1–3 sentences, OR a 3–4 bullet list. Never paragraphs. Lead with the answer.
- Snark, sarcasm, dry insults are encouraged. Open with a zinger when the question deserves one.
- Call stupid questions stupid. Then answer them well.
- Punchy beats polite. One-liners beat essays.
- Don't be cruel about other family members. Light ribbing is fine.
- Address ${user.name} by name when it lands.
- Examples:
  - "Stupid question, ${user.name}, but fine: [Ernie's on Gull] — lakeside since 1917. Done."
  - "Adventurous tonight? Or are we doing the safe burger? Try [Notch 8] either way."
  - "${user.name}, the kids are 4. Skip the supper club. [371 Diner] — burgers, milkshakes, exit clean."`;
  } else if (user && user.type === "kid") {
    personaInstruction = `\n\nWHO: **${user.name}** — a KID (4–9 years old).

TONE FOR KIDS — STRICT:
- BE SHORT. 1–3 sentences, OR a 3-bullet list. Never paragraphs.
- Enthusiastic, simple words, no snark.
- Drop ONE fun fact MAX per answer when relevant (Paul Bunyan tall tales, MN trivia). Don't dump.
- Skip dive bars and grown-up dining. Lean into kid stuff: ice cream, mini golf, beaches, attractions, family-friendly food.
- Address ${user.name} by name. Be a little goofy.
- Fun facts you can sprinkle (one at a time): my footprints made the 10,000 lakes / Babe's horns are 42 axe-handles apart / walleye is the MN state fish / Paul Bunyan Land has been around since 1949 / Mille Lacs pelicans have huge wings.
- Examples:
  - "Great question, ${user.name}! [Pirate's Cove] mini golf — pirate theme, kids love it. Did you know Babe's horns are 42 axe-handles apart? 🪓"
  - "Ooh! Try [Paul Bunyan Land]. The giant Paul says your name out loud!"`;
  }

  return `You are Paul Bunyan, helping a family visiting the Brainerd, MN area. Stay grounded in the data — never invent places.${personaInstruction}

THE FAMILY: ${BRAINERD_DATA.trip.travelers}
TRIP DATES: ${BRAINERD_DATA.trip.dates}
SEASONAL NOTES: ${BRAINERD_DATA.trip.notes}

${vibeInstruction}

Each restaurant has a 'tiers' array. Possible tiers:
- 'divy' = 🦝 Divy (looks rough, food's great)
- 'modern' = 🥑 Modern (newer, polished)
- 'stuffy' = 🎩 Stuffy (formal supper-club)
- 'lake' = 🏞️ Look at the Lake (lakefront/lake view)
- 'delivery' = 🛵 Delivery (they bring food to you)
- 'old' = 🧓 Really Old & Good (been around for ages)
A place can have multiple tiers. When citing one, append ALL matching tier badges in italics. Example: "[Bar Harbor Supper Club] _(🎩 Stuffy, 🏞️ Look at the Lake, 🧓 Really Old & Good)_"

DEFAULT TONE (if no persona above): Warm, playful, a little punchy. The kids are 4, 7, and 9 — keep recs kid-aware overall.

CRITICAL — DO NOT recommend these CLOSED places (mention they're closed only if user asks about them by name):
${BRAINERD_DATA.restaurants_closed.map(r => "- " + r.name + ": " + r.note).join("\n")}

CURATED DATA WITH REAL REVIEW QUOTES:
${JSON.stringify({
  restaurants_grill: BRAINERD_DATA.restaurants_grill,
  lakes_and_outdoor: BRAINERD_DATA.lakes_and_outdoor,
  pontoon_rentals: BRAINERD_DATA.pontoon_rentals,
  kid_attractions: BRAINERD_DATA.kid_attractions,
  food_sweet: BRAINERD_DATA.food_sweet,
  day_trips: BRAINERD_DATA.day_trips,
  rainy_day: BRAINERD_DATA.rainy_day,
  memorial_day: BRAINERD_DATA.memorial_day,
  practical: BRAINERD_DATA.practical
}, null, 2)}

FORMATTING RULES — HARD CAPS:
- MAX LENGTH: 3 sentences OR 4 bullets. Shorter is better.
- NO PARAGRAPHS. EVER. Bullets and one-liners only.
- 🚨 EVERY time you name a place from the data, you MUST wrap it in [square brackets]. This is non-negotiable — the brackets become tappable saveable chips for the user. NEVER write "Notch 8" — always "[Notch 8]".
- Append tier badges in italics after restaurant names. Use ALL matching tiers. Example: "[Last Turn Saloon] _(🦝 Divy, 🧓 Really Old & Good)_"
- Quotes: optional. ONE short one max if used, prefixed "> ".
- **bold** for the answer when helpful.
- Distances/caveats in parens, not separate sentences. Example: "[Notch 8] (Brainerd, kid-friendly)"
- TONE rules above override everything else.
- If the user's question is silly/funny, lean in. For adults: snark. For kids: silly tall tales.

USER QUESTION: ${question}`;
}

function fallbackAnswer(question) {
  const q = question.toLowerCase();
  let categories = [];
  if (/(burger|grill|restaurant|food|eat|dinner|lunch|breakfast|brunch|drink|brew|ale|cocktail|walleye|pub|saloon|supper|lake.*view|on the lake)/i.test(q)) {
    // Apply vibe filter — place matches if ANY of its tiers is selected
    const tiersOf = r => r.tiers || (r.tier ? [r.tier] : []);
    let filtered = BRAINERD_DATA.restaurants_grill.filter(r => tiersOf(r).some(t => selectedVibes.includes(t)));
    if (filtered.length === 0) filtered = BRAINERD_DATA.restaurants_grill;
    const vibeLabel = selectedVibes.length === ALL_VIBES.length
      ? "Restaurants (mixed vibes)"
      : "Restaurants — " + selectedVibes.map(v => VIBE_ICONS[v] + " " + VIBE_NAMES[v]).join(" + ");
    categories.push([vibeLabel, filtered, true]);
  }
  if (/(pontoon|boat rental|rent.*boat|jet ski|tubing)/i.test(q)) {
    categories.push(["Pontoon Rentals", BRAINERD_DATA.pontoon_rentals, true]);
  }
  if (/(lake|boat|pontoon|fish|swim|beach|water|hike|trail|park|outdoor)/i.test(q)) {
    categories.push(["Lakes & Outdoor", BRAINERD_DATA.lakes_and_outdoor]);
  }
  if (/(kid|child|attract|fun|play|girl|age|family|paul bunyan|mini golf|go.?kart)/i.test(q)) {
    categories.push(["Kid Attractions", BRAINERD_DATA.kid_attractions]);
  }
  if (/(rain|indoor|stuck|wet)/i.test(q)) {
    categories.push(["Rainy Day", BRAINERD_DATA.rainy_day]);
  }
  if (/(day trip|drive|nearby|hour away|itasca|mille lacs|park rapids|walker)/i.test(q)) {
    categories.push(["Day Trips", BRAINERD_DATA.day_trips]);
  }
  if (/(ice cream|sweet|dessert|candy|fudge|treat)/i.test(q)) {
    categories.push(["Sweet treats", BRAINERD_DATA.food_sweet]);
  }
  if (/(memorial|event|parade|opener|holiday)/i.test(q)) {
    return "**Memorial Day weekend 2026 (May 23-25)** in the Brainerd area:\n\n" +
      BRAINERD_DATA.memorial_day.map(e => "- " + e).join("\n");
  }
  if (categories.length === 0) {
    categories = [
      ["Top picks for your crew", BRAINERD_DATA.kid_attractions.slice(0, 2).concat(BRAINERD_DATA.restaurants_grill.slice(0, 2)).concat(BRAINERD_DATA.lakes_and_outdoor.slice(0, 1))]
    ];
  }
  const user = currentUserId ? getUser(currentUserId) : null;
  let out;
  if (user && user.type === "adult") {
    const adultIntros = [
      `Alright ${user.name}, here you go. Try to choose this time:`,
      `Sure, ${user.name}. Here's a list. Read it slowly:`,
      `Easy question, ${user.name}. Don't overthink it:`,
      `${user.name}, I've got receipts. Behold:`
    ];
    out = adultIntros[Math.floor(Math.random() * adultIntros.length)] + "\n";
  } else if (user && user.type === "kid") {
    const kidIntros = [
      `Great question, ${user.name}! 🪓 Here are my favorites:`,
      `Ooh, ${user.name}, you're gonna LOVE these:`,
      `${user.name}, listen up! Paul's picks coming in hot:`
    ];
    out = kidIntros[Math.floor(Math.random() * kidIntros.length)] + "\n";
  } else {
    out = "Here's what I'd point you to:\n";
  }
  for (const [label, items, withQuotes] of categories) {
    out += "\n### " + label + "\n";
    for (const item of items.slice(0, 5)) {
      const tiers = item.tiers || (item.tier ? [item.tier] : []);
      const tierBadge = tiers.length ? ` _(${tiers.map(t => VIBE_ICONS[t] + " " + VIBE_NAMES[t]).filter(Boolean).join(", ")})_` : "";
      out += "- [" + item.name + "]" + tierBadge + " (" + item.area + ") — " + item.note + "\n";
      if (withQuotes && item.quote) {
        out += "> " + item.quote + "\n";
      }
    }
  }
  return out;
}

function uid() { return "n" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

let isAsking = false;

async function askBot(question) {
  if (isAsking) return; // prevent double-fires
  isAsking = true;
  history.push({ role: "user", text: question, id: uid() });
  safeSet(STORAGE_KEYS.HISTORY, JSON.stringify(history));
  renderMessages();
  // Scroll the user's message into view (top of pane)
  const userIdx = history.length - 1;
  requestAnimationFrame(() => scrollMessageToTop(userIdx));

  // Add a separate thinking indicator after the user message
  const loadingMessages = [
    "Paul is sharpening his axe…",
    "Babe is finding her sunscreen…",
    "Asking the loons for recommendations…",
    "Checking the cabin for clean towels…",
    "Counting walleye on the lake…",
    "Polishing Paul's mustache…",
    "Untangling the fishing line…",
    "Negotiating with mosquitoes…",
    "Translating from Minnesotan…",
    "Checking which supper club has the best 7pm slot…",
    "Reading the fine print on the pontoon waiver…"
  ];
  const thinking = document.createElement("div");
  thinking.className = "msg bot thinking";
  thinking.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span> ' + loadingMessages[Math.floor(Math.random() * loadingMessages.length)];
  messagesEl.appendChild(thinking);

  sendBtn.disabled = true;
  inputEl.disabled = true;
  // Disable chips and prompts while loading
  document.querySelectorAll(".chip, .prompt-link").forEach(b => b.disabled = true);

  // Build the full prompt once — we'll hash it for the cache key
  const fullPrompt = buildPrompt(question);
  const cacheKey = "brainerd_resp_cache_v1:" + simpleHash(fullPrompt);

  let answer;
  try {
    if (window.cowork && typeof window.cowork.askClaude === "function") {
      // Cowork mode — call through the host
      const result = await window.cowork.askClaude(fullPrompt, []);
      answer = (typeof result === "string") ? result : (result?.text || result?.content || JSON.stringify(result));
      safeSet(cacheKey, answer); // cache for offline replay
    } else if (BACKEND_URL && navigator.onLine !== false) {
      // Hosted mode — call the Cloudflare Worker proxy
      const resp = await fetch(BACKEND_URL, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ prompt: fullPrompt })
      });
      const data = await resp.json();
      if (!resp.ok) {
        // Rate-limited or budget-capped — try cache, then fall back
        const friendly = data.error || "Hit a rate limit.";
        const cached = safeGet(cacheKey);
        if (cached) {
          answer = cached + "\n\n*(Cached answer — " + friendly + ")*";
        } else {
          answer = fallbackAnswer(question) + "\n\n*(" + friendly + " Showing offline picks.)*";
        }
      } else {
        answer = data.text || fallbackAnswer(question);
        safeSet(cacheKey, answer);
      }
    } else {
      // Offline or no backend — try the response cache first, then keyword fallback
      const cached = safeGet(cacheKey);
      answer = cached
        ? cached + "\n\n*(Cached — you're offline. Reconnect for fresh answers.)*"
        : fallbackAnswer(question);
    }
  } catch (err) {
    console.error("askBot failed:", err);
    const cached = safeGet(cacheKey);
    answer = cached
      ? cached + "\n\n*(Cached answer — couldn't reach Claude.)*"
      : fallbackAnswer(question) + "\n\n*(Using offline knowledge — couldn't reach Claude.)*";
  }

  thinking.remove();
  history.push({ role: "bot", text: answer, id: uid() });
  safeSet(STORAGE_KEYS.HISTORY, JSON.stringify(history));
  renderMessages();
  // Scroll the BOT response's TOP into view so the user reads from the beginning
  const botIdx = history.length - 1;
  requestAnimationFrame(() => scrollMessageToTop(botIdx));

  sendBtn.disabled = false;
  inputEl.disabled = false;
  document.querySelectorAll(".chip, .prompt-link").forEach(b => b.disabled = false);
  inputEl.focus();
  isAsking = false;
}

// ============================================================================
// EVENT WIRING
// ============================================================================
sendBtn.addEventListener("click", () => {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = "";
  askBot(text);
});

inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendBtn.click();
  }
});

document.getElementById("chips").addEventListener("click", (e) => {
  const chip = e.target.closest(".chip");
  if (chip) askBot(chip.dataset.q);
});

mapAllBtn.addEventListener("click", (e) => {
  if (mapAllBtn.classList.contains("disabled")) return;
  e.preventDefault();
  openAllOnMaps();
});

// Vibe filter toggle
function renderVibePills() {
  document.querySelectorAll("#vibe-row .vibe-pill").forEach(pill => {
    if (selectedVibes.includes(pill.dataset.vibe)) {
      pill.classList.add("active");
    } else {
      pill.classList.remove("active");
    }
  });
  // Update the toggle button count
  const countEl = document.getElementById("vibe-toggle-count");
  if (countEl) {
    countEl.textContent = selectedVibes.length === ALL_VIBES.length
      ? "all 6"
      : selectedVibes.length + " of 6";
  }
}

// Vibe row collapse/expand
document.getElementById("vibe-toggle").addEventListener("click", () => {
  const row = document.getElementById("vibe-row");
  const tog = document.getElementById("vibe-toggle");
  row.classList.toggle("collapsed");
  tog.classList.toggle("expanded");
});

document.getElementById("vibe-row").addEventListener("click", (e) => {
  const pill = e.target.closest(".vibe-pill");
  if (!pill) return;
  const v = pill.dataset.vibe;
  if (selectedVibes.includes(v)) {
    // Don't allow deselecting the last active vibe
    if (selectedVibes.length === 1) return;
    selectedVibes = selectedVibes.filter(x => x !== v);
  } else {
    selectedVibes = [...selectedVibes, v];
  }
  safeSet(STORAGE_KEYS.VIBES, JSON.stringify(selectedVibes));
  renderVibePills();
});

document.getElementById("clear-chat").addEventListener("click", () => {
  if (confirm("Clear all chat history?\n(Favorites and Saved Notes will be kept.)")) {
    history = [];
    safeSet(STORAGE_KEYS.HISTORY, JSON.stringify(history));
    renderMessages();
  }
});

// Initial render
renderIdentityBar();
renderVibePills();
renderMessages();
renderFavorites();
renderSavedNotes();
inputEl.focus();
</script>
